<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nirix — Technical Dashboard</title>
  <style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: #0A1628;
  color: #FFFFFF;
  min-height: 100vh;
  line-height: 1.4;
}
button { font-family: inherit; cursor: pointer; }
.stab { color:#7A9AB0;font-weight:400;border-bottom:2px solid transparent;background:transparent; }
.stab:hover { color:#FFFFFF; }
.stab.on { color:#FFFFFF;font-weight:600;background:#0D2A3A;border-bottom:2px solid #0D9AAA; }
.ttab { color:#7A9AB0;font-weight:400;border-bottom:2px solid transparent;background:transparent; }
.ttab:hover { color:#FFFFFF; }
.ttab.on { color:#FFFFFF;font-weight:500;background:#0D1F3C;border-bottom:2px solid #0D6A7A; }
.chevron { display:inline-block;transition:transform 0.2s; }
.chevron.open { transform:rotate(90deg); }
select { background:#0D1F3C;border:1px solid #1E3A5F;border-radius:6px;color:#FFFFFF;font-size:13px;font-weight:600;padding:6px 10px;cursor:pointer;outline:none;font-family:inherit; }
select:hover { border-color:#0D8A9A; }
select option { background:#0D1F3C;color:#FFFFFF; }
::-webkit-scrollbar { width:5px;height:5px; }
::-webkit-scrollbar-track { background:#0A1628; }
::-webkit-scrollbar-thumb { background:#1E3A5F;border-radius:3px; }
::-webkit-scrollbar-thumb:hover { background:#2A4A6A; }
  </style>
  <script>
    const DASHBOARD_PASS = 'nirix2026';
    const SHEETS_API_KEY = 'AIzaSyCMq8X5Mfwdnz1Soa_RF70A6voHaA7Xm28';
    const SHEET_ID       = '1qul0ee5Ioh526zXw-dXBakCMFZk3emJhM6lRdM6pEKA';
    const SHEET_NAME     = 'Sheet1';
    const SPECS_SHEET    = 'EngineSpecs';
    const SHEET_URL      = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${SHEET_NAME}?key=${SHEETS_API_KEY}`;
    const SPECS_URL      = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${SPECS_SHEET}?key=${SHEETS_API_KEY}`;

    const SEA_CABBIE  = ['SG Ekam','SG Naav','SG Dve','SG Trinee','SG Chatur','SG Panch','SG Sapta','SG Ashta','Vayu 1','Vayu 2','SG Rhine','KM Golf'];
    const SG_SHIPPING = ['SG Galaxy','SG Brave','SG Fortune','SG Justice','SG Patience','SG Loyalty','SG Generous','SG Integrity','SG Dhalia','SG Sunflower','SG Jasmine','SG Marigold'];
    const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    const MONTH_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const WEEKDAYS    = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const PARAMS = ['Submitted by','Port oil level','Port oil temp (°C)','Port coolant (°C)','Port run hours','Stbd oil level','Stbd oil temp (°C)','Stbd coolant (°C)','Stbd run hours','Bilge','Fuel level'];
    const PARAM_KEY = {
      'Submitted by':'Engineer','Port oil level':'Port Oil Level','Port oil temp (°C)':'Port Oil Temp C',
      'Port coolant (°C)':'Port Coolant Temp C','Port run hours':'Port Running Hours',
      'Stbd oil level':'Stbd Oil Level','Stbd oil temp (°C)':'Stbd Oil Temp C',
      'Stbd coolant (°C)':'Stbd Coolant Temp C','Stbd run hours':'Stbd Running Hours',
      'Bilge':'Bilge Status','Fuel level':'FO Port Level (L)'
    };

    let activeModule='daily', activeView='daily', activeRunhrs='fleet';
    let allRows=[], specRows=[], selectedBoat='SG Ekam';
    let currentMonth=new Date().getMonth(), currentYear=new Date().getFullYear();
    let runhrsMonth=new Date().getMonth(), runhrsYear=new Date().getFullYear();
    let fleetCompany='Sea Cabbie', fleetOlderShown=false;
    let refreshTimer=null;

    function todaySGT(){return new Date(Date.now()+8*3600000).toISOString().slice(0,10);}
    function toSGTDate(iso){if(!iso)return '';return new Date(new Date(iso).getTime()+8*3600000).toISOString().slice(0,10);}
    function toSGTTime(iso){if(!iso)return '—';return new Date(new Date(iso).getTime()+8*3600000).toISOString().slice(11,16);}
    function fmtDate(ds){if(!ds)return '—';const [y,m,d]=ds.split('-');return `${parseInt(d)} ${MONTH_SHORT[parseInt(m)-1]} ${y}`;}
    function fmtDateLong(ds){const d=new Date(ds+'T00:00:00');return `${WEEKDAYS[d.getDay()]} ${d.getDate()} ${MONTH_SHORT[d.getMonth()]} ${d.getFullYear()}`;}
    function daysAgo(ds){return Math.floor((new Date(todaySGT())-new Date(ds))/86400000);}
    function fmtMonthLabel(month,year){return `${MONTH_SHORT[month]} ${String(year).slice(2)}`;}

    function rowsForBoatDate(boat,dateStr){
      return allRows.filter(r=>{
        if((r['Boat']||'')!==boat)return false;
        const sa=r['Submitted At']||'';
        if(sa&&toSGTDate(sa)===dateStr)return true;
        return(r['Date']||'').slice(0,10)===dateStr;
      });
    }
    function rowsForBoatMonth(boat,month,year){
      return allRows.filter(r=>{
        if((r['Boat']||'')!==boat)return false;
        const ds=r['Submitted At']?toSGTDate(r['Submitted At']):(r['Date']||'').slice(0,10);
        if(!ds)return false;
        const d=new Date(ds);
        return d.getMonth()===month&&d.getFullYear()===year;
      });
    }

    function collectAlerts(r){
      if(!r)return [];
      const a=[];
      if(r['Port Oil Level']&&r['Port Oil Level']!=='OK')a.push(`Port Oil ${r['Port Oil Level']}`);
      if(r['Port Oil Temp Status']==='High')a.push(`Port Oil Temp HIGH (${r['Port Oil Temp C']}°C)`);
      if(r['Port Coolant Level']&&r['Port Coolant Level']!=='OK')a.push(`Port Coolant ${r['Port Coolant Level']}`);
      if(parseFloat(r['Port Coolant Temp C'])>=90)a.push(`Port Coolant Temp ${r['Port Coolant Temp C']}°C`);
      if(r['Port Smoke']&&r['Port Smoke']!=='No Smoke')a.push(`Port Smoke: ${r['Port Smoke']}`);
      if(r['Port LO Leak']==='Yes')a.push('Port LO Leak');
      if(r['Port FO Leak']==='Yes')a.push('Port FO Leak');
      if(r['Port Gearbox Oil']==='LOW')a.push('Port Gearbox Oil LOW');
      if(r['Stbd Oil Level']&&r['Stbd Oil Level']!=='OK')a.push(`Stbd Oil ${r['Stbd Oil Level']}`);
      if(r['Stbd Oil Temp Status']==='High')a.push(`Stbd Oil Temp HIGH (${r['Stbd Oil Temp C']}°C)`);
      if(r['Stbd Coolant Level']&&r['Stbd Coolant Level']!=='OK')a.push(`Stbd Coolant ${r['Stbd Coolant Level']}`);
      if(parseFloat(r['Stbd Coolant Temp C'])>=90)a.push(`Stbd Coolant Temp ${r['Stbd Coolant Temp C']}°C`);
      if(r['Stbd Smoke']&&r['Stbd Smoke']!=='No Smoke')a.push(`Stbd Smoke: ${r['Stbd Smoke']}`);
      if(r['Stbd LO Leak']==='Yes')a.push('Stbd LO Leak');
      if(r['Stbd FO Leak']==='Yes')a.push('Stbd FO Leak');
      if(r['Stbd Gearbox Oil']==='LOW')a.push('Stbd Gearbox Oil LOW');
      if(r['Bilge Status']==='Water')a.push('Bilge WATER');
      if(r['Bilge Pump']==='Not Working')a.push('Bilge Pump DOWN');
      return a;
    }
    function boatStatus(boat,dateStr){
      const row=rowsForBoatDate(boat,dateStr)[0];
      if(!row)return 'missing';
      const alerts=collectAlerts(row);
      if(!alerts.length)return 'ok';
      const hasCH=parseFloat(row['Port Coolant Temp C'])>=90||parseFloat(row['Stbd Coolant Temp C'])>=90;
      const hasOL=(row['Port Oil Level']&&row['Port Oil Level']!=='OK')||(row['Stbd Oil Level']&&row['Stbd Oil Level']!=='OK');
      if(hasCH||(hasOL&&row['Bilge Status']==='Water'))return 'critical';
      return 'alert';
    }
    function dotColour(s){return s==='ok'?'#1A9A6A':s==='alert'?'#D4920A':s==='critical'?'#C84040':'#3A4A60';}
    function cardBorder(s){return s==='ok'?'#1A5A3A':s==='alert'?'#7A5000':s==='critical'?'#7A2020':'#1E3A5F';}

    function getSpec(boat,side){return specRows.find(r=>r['Boat']===boat&&r['Engine Side']===side)||null;}
    function getLatestRunHrs(boat,side){
      const field=side==='Port'?'Port Running Hours':'Stbd Running Hours';
      const rows=allRows.filter(r=>r['Boat']===boat&&r[field]).sort((a,b)=>new Date(b['Submitted At'])-new Date(a['Submitted At']));
      return rows.length?parseFloat(rows[0][field]):null;
    }
    function hrsToNextSvc(boat,side){
      const spec=getSpec(boat,side);const cur=getLatestRunHrs(boat,side);
      if(!spec||cur===null)return null;
      return(parseFloat(spec['Last Service Hrs'])||0)+(parseFloat(spec['Service Interval (hrs)'])||3000)-cur;
    }
    function svcColour(hrs){if(hrs===null)return '#8AA8C0';if(hrs<=0)return '#C84040';if(hrs<=250)return '#D4920A';return '#1A9A6A';}
    function monthlyHrsMap(boat,side,month,year){
      const field=side==='Port'?'Port Running Hours':'Stbd Running Hours';
      const map={};
      allRows.filter(r=>r['Boat']===boat&&r[field]).forEach(r=>{
        const ds=r['Submitted At']?toSGTDate(r['Submitted At']):(r['Date']||'').slice(0,10);
        if(!ds)return;
        const d=new Date(ds);
        if(d.getMonth()===month&&d.getFullYear()===year)map[d.getDate()]=parseFloat(r[field]);
      });
      return map;
    }

    // Returns most recent cumulative run hrs recorded ON OR BEFORE end of (month, year).
    // If no data in that month, carries forward the last known value from any earlier report.
    function runHrsForMonth(boat,side,month,year){
      const field=side==='Port'?'Port Running Hours':'Stbd Running Hours';
      const cutoff=new Date(year,month+1,0,23,59,59);
      const relevant=allRows
        .filter(r=>r['Boat']===boat&&r[field]&&parseFloat(r[field])>0)
        .map(r=>{
          const ds=r['Submitted At']?toSGTDate(r['Submitted At']):(r['Date']||'').slice(0,10);
          return {val:parseFloat(r[field]),date:new Date(ds)};
        })
        .filter(r=>!isNaN(r.date)&&r.date<=cutoff)
        .sort((a,b)=>b.date-a.date);
      return relevant.length?relevant[0].val:null;
    }

    // Generate array of {month,year} newest-first
    function monthSequence(count){
      const now=new Date(Date.now()+8*3600000);
      const result=[];
      let m=now.getMonth(),y=now.getFullYear();
      for(let i=0;i<count;i++){
        result.push({month:m,year:y});
        m--;if(m<0){m=11;y--;}
      }
      return result;
    }

    async function loadData(){
      try{
        const [r1,r2]=await Promise.all([fetch(SHEET_URL),fetch(SPECS_URL)]);
        const [j1,j2]=await Promise.all([r1.json(),r2.json()]);
        if(j1.values&&j1.values.length>=2){const h=j1.values[0];allRows=j1.values.slice(1).map(row=>{const o={};h.forEach((k,i)=>o[k]=row[i]||'');return o;});}else{allRows=[];}
        if(j2.values&&j2.values.length>=2){const h=j2.values[0];specRows=j2.values.slice(1).map(row=>{const o={};h.forEach((k,i)=>o[k]=row[i]||'');return o;});}else{specRows=[];}
        renderAll();
      }catch(e){console.error('Sheets fetch failed',e);}
    }

    function renderAll(){
      if(activeModule==='daily'){if(activeView==='daily')renderDaily();else renderMonthly();}
      else{if(activeRunhrs==='fleet')renderFleet();else if(activeRunhrs==='runhrs')renderRunhrs();else renderSpecs();}
    }

    // ── DAILY REPORTS MODULE ──
    function renderDaily(){
      const today=todaySGT();
      document.getElementById('v-daily').innerHTML=
        `<div style="font-size:12px;color:#8AA8C0;margin-bottom:14px"><strong style="font-size:13px;color:#FFFFFF;font-weight:500">Today</strong> &nbsp;—&nbsp;${fmtDateLong(today)}</div>
        <div style="display:flex;gap:0">
          <div style="flex:1;padding-right:18px;margin-right:18px;border-right:1px solid #1E3A5F">${buildColumn('Sea Cabbie',SEA_CABBIE,today)}</div>
          <div style="flex:1">${buildColumn('SG Shipping',SG_SHIPPING,today)}</div>
        </div>`;
    }

    function buildColumn(company,boats,today){
      const st=boats.map(b=>({boat:b,status:boatStatus(b,today),row:rowsForBoatDate(b,today)[0]||null}));
      const ok=st.filter(s=>s.status==='ok').length,al=st.filter(s=>s.status==='alert').length;
      const cr=st.filter(s=>s.status==='critical').length,ms=st.filter(s=>s.status==='missing').length;
      const isSea=company==='Sea Cabbie';
      const companyTab=`<div style="display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:7px;border:1px solid ${isSea?'#1A3A5A':'#1E2E4A'};background:${isSea?'#071828':'#0D1A2E'};margin-bottom:10px">
        <div style="width:30px;height:30px;border-radius:50%;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:${isSea?'#0D2040':'#1A0D28'};border:1px solid ${isSea?'#2A5080':'#4A2060'}">${isSea?seaCabbieLogoHTML():sgShippingLogoHTML()}</div>
        <div><div style="font-size:11px;font-weight:700;color:#FFFFFF;letter-spacing:0.06em;text-transform:uppercase">${company}</div><div style="font-size:9px;color:#8AA8C0;margin-top:1px">12 vessels</div></div></div>`;
      const counts=`<div style="display:flex;gap:5px;margin-bottom:12px">${countBox(ok,'Submitted<br>OK','#071E14','#0D4A2A')}${countBox(al,'Alert','#1E1200','#6A4A00')}${countBox(cr,'Critical','#1E0808','#6A2020')}${countBox(ms,'Not<br>submitted','#0A1220','#1A2A3A')}</div>`;
      const groups=[{key:'critical',label:'Critical alert',dot:'#C84040'},{key:'alert',label:'Alert',dot:'#D4920A'},{key:'ok',label:'Submitted',dot:'#1A9A6A'},{key:'missing',label:'Not submitted',dot:'#3A4A60'}];
      let grpHTML='';
      groups.forEach(g=>{
        const items=st.filter(s=>s.status===g.key);if(!items.length)return;
        grpHTML+=`<div style="margin-bottom:12px"><div style="display:flex;align-items:center;gap:5px;margin-bottom:5px;font-size:9px;font-weight:600;color:#8AA8C0;letter-spacing:0.08em;text-transform:uppercase">
          <div style="width:7px;height:7px;border-radius:50%;background:${g.dot};flex-shrink:0"></div>${g.label}
          <span style="font-size:9px;color:#8AA8C0;background:#0A1628;border:0.5px solid #1E2A3A;padding:1px 5px;border-radius:8px">${items.length}</span></div>
          ${items.map(s=>buildBoatCard(s.boat,s.status,s.row,today)).join('')}</div>`;
      });
      return companyTab+counts+`<div style="height:0.5px;background:#1E3A5F;margin:10px 0"></div>`+grpHTML;
    }

    function countBox(n,label,bg,border){
      return `<div style="flex:1;background:${bg};border:1px solid ${border};border-radius:5px;padding:5px 3px;display:flex;flex-direction:column;align-items:center">
        <div style="font-size:14px;font-weight:700;color:#FFFFFF;line-height:1">${n}</div>
        <div style="font-size:8px;color:#8AA8C0;margin-top:2px;text-align:center;line-height:1.2">${label}</div></div>`;
    }

    function buildBoatCard(boat,status,row,today){
      const isMissing=status==='missing';
      const alerts=row?collectAlerts(row):[];
      const time=row?toSGTTime(row['Submitted At']):'';
      const border=cardBorder(status);
      const opacity=isMissing?'opacity:0.6;':'';
      const cursor=isMissing?'cursor:default;':'cursor:pointer;';
      const hoverOn=isMissing?'':`onmouseover="this.style.background='#0F2540'"`;
      const hoverOff=isMissing?'':`onmouseout="this.style.background='#0D1F3C'"`;
      const click=isMissing?'':`onclick="openModal('${boat}','${today}')"`;
      const pills=alerts.length>0?`<div style="display:flex;gap:3px;flex-wrap:wrap;margin-top:3px">${alerts.slice(0,3).map(a=>`<span style="font-size:9px;padding:1px 5px;border-radius:3px;color:#FFFFFF;background:${status==='critical'?'#3A0A0A':'#3A2800'}">${a}</span>`).join('')}</div>`:'';
      return `<div ${hoverOn} ${hoverOff} ${click} style="${cursor}${opacity}display:flex;flex-direction:column;padding:7px 10px;border-radius:6px;margin-bottom:4px;background:#0D1F3C;border:1px solid ${border}">
        <div style="display:flex;align-items:center;gap:6px"><span style="font-size:13px;color:#FFFFFF;flex:1">${boat}</span>${time?`<span style="font-size:10px;color:#8AA8C0">${time}</span>`:''}</div>${pills}</div>`;
    }

    function renderMonthly(){renderRail();renderGrid();}

    function renderRail(){
      const today=todaySGT();let html='';
      [['Sea Cabbie',SEA_CABBIE],['SG Shipping',SG_SHIPPING]].forEach(([company,boats],ci)=>{
        if(ci>0)html+=`<div style="height:1px;background:#1E3A5F;margin:2px 0"></div>`;
        html+=`<div style="font-size:9px;font-weight:600;color:#8AA8C0;letter-spacing:0.1em;text-transform:uppercase;padding:6px 14px 3px">${company}</div>`;
        boats.forEach(boat=>{
          const st=boatStatus(boat,today);const sel=boat===selectedBoat;
          html+=`<div onclick="selectBoat('${boat}')"
            onmouseover="if('${boat}'!==selectedBoat)this.style.background='#0A1628',this.style.color='#FFFFFF'"
            onmouseout="if('${boat}'!==selectedBoat)this.style.background='transparent',this.style.color='#8AA8C0'"
            style="display:flex;align-items:center;gap:7px;padding:7px 14px;cursor:pointer;border-left:3px solid ${sel?'#0D6A7A':'transparent'};background:${sel?'#0A1628':'transparent'};font-size:13px;color:${sel?'#FFFFFF':'#8AA8C0'};font-weight:${sel?'500':'400'}">
            <div style="width:7px;height:7px;border-radius:50%;background:${dotColour(st)};flex-shrink:0"></div>${boat}</div>`;
        });
      });
      document.getElementById('rail-inner').innerHTML=html;
    }

    function selectBoat(boat){selectedBoat=boat;renderRail();renderGrid();}

    function renderGrid(){
      const dim=new Date(currentYear,currentMonth+1,0).getDate();
      const today=todaySGT();const todayD=parseInt(today.slice(8));
      const isThisMo=currentMonth===new Date().getMonth()&&currentYear===new Date().getFullYear();
      document.getElementById('mv-boat').textContent=selectedBoat;
      document.getElementById('mv-month').textContent=` — ${MONTH_NAMES[currentMonth]} ${currentYear}`;
      const monthRows=rowsForBoatMonth(selectedBoat,currentMonth,currentYear);
      const dayMap={};
      monthRows.forEach(r=>{const ds=r['Submitted At']?toSGTDate(r['Submitted At']):(r['Date']||'').slice(0,10);const d=parseInt(ds.slice(8));if(!dayMap[d])dayMap[d]=r;});
      let thHTML=`<th style="text-align:left;min-width:160px;background:#0D1F3C;color:#FFFFFF;font-size:11px;font-weight:500;padding:5px 10px;border:1px solid #1E3A5F"></th>`;
      for(let d=1;d<=dim;d++){
        const isToday=isThisMo&&d===todayD;const isFuture=isThisMo&&d>todayD;
        thHTML+=`<th style="text-align:center;min-width:38px;padding:5px 6px;border:1px solid #1E3A5F;font-size:11px;font-weight:500;background:${isToday?'#0D2A3A':'#0D1F3C'};color:${isFuture?'#3A4A60':'#FFFFFF'}">${d}</th>`;
      }
      let tbHTML='';
      PARAMS.forEach(param=>{
        const sheetKey=PARAM_KEY[param];
        let rowHTML=`<td style="text-align:left;background:#0D1F3C;color:#FFFFFF;cursor:default;border:1px solid #1A2F4A;padding:5px 10px;font-size:12px">${param}</td>`;
        for(let d=1;d<=dim;d++){
          const isFuture=isThisMo&&d>todayD;const isToday=isThisMo&&d===todayD;
          const row=dayMap[d]||null;const bgBase=isToday?'#0D2A3A':'#0A1628';
          if(isFuture||!row){rowHTML+=`<td style="text-align:center;background:${bgBase};color:#3A4A60;border:1px solid #1A2F4A;padding:4px 6px;font-size:11px;cursor:default">—</td>`;continue;}
          const val=row[sheetKey]||'—';
          const dateDs=`${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
          const cell=formatGridCell(param,val,row);
          rowHTML+=`<td onclick="openModal('${selectedBoat}','${dateDs}')" onmouseover="this.style.background='#0D1F3C'" onmouseout="this.style.background='${bgBase}'"
            style="text-align:center;background:${bgBase};border:1px solid #1A2F4A;padding:4px 6px;font-size:11px;cursor:pointer">${cell}</td>`;
        }
        tbHTML+=`<tr>${rowHTML}</tr>`;
      });
      document.getElementById('grid-table').innerHTML=`<thead><tr>${thHTML}</tr></thead><tbody>${tbHTML}</tbody>`;
    }

    function formatGridCell(param,val,row){
      if(param==='Submitted by')return `<span style="color:#FFFFFF">${val||'—'}</span>`;
      if(param==='Port oil level'||param==='Stbd oil level'){if(!val||val==='—')return `<span style="color:#3A4A60">—</span>`;return val==='OK'?badge('OK','#071E14'):badge(val,'#1E1200');}
      if(param==='Bilge'){if(!val||val==='—')return `<span style="color:#3A4A60">—</span>`;if(val.toLowerCase()==='dry')return badge('Dry','#071E14');if(val.toLowerCase()==='water')return badge('Wet','#1E0808');return `<span style="color:#8AA8C0">${val}</span>`;}
      const isCoolantAlert=param.includes('coolant')&&parseFloat(val)>=90;
      const isOilTempAlert=(param==='Port oil temp (°C)'&&row['Port Oil Temp Status']==='High')||(param==='Stbd oil temp (°C)'&&row['Stbd Oil Temp Status']==='High');
      if(isCoolantAlert)return `<span style="color:#C84040;font-weight:500">${val}</span>`;
      if(isOilTempAlert)return `<span style="color:#D4920A;font-weight:500">${val}</span>`;
      return `<span style="color:#AABFCC">${val||'—'}</span>`;
    }

    function badge(text,bg){return `<span style="background:${bg};color:#FFFFFF;border-radius:3px;padding:1px 5px;font-size:10px;display:inline-block">${text}</span>`;}
    function prevMonth(){currentMonth--;if(currentMonth<0){currentMonth=11;currentYear--;}renderGrid();}
    function nextMonth(){currentMonth++;if(currentMonth>11){currentMonth=0;currentYear++;}renderGrid();}

    // ── MODAL ──
    function openModal(boat,dateStr){
      const row=rowsForBoatDate(boat,dateStr)[0]||null;if(!row)return;
      const alerts=collectAlerts(row);const status=boatStatus(boat,dateStr);
      const time=toSGTTime(row['Submitted At']);const dAgo=daysAgo(dateStr);const hasPics=dAgo<=7;
      const badgeBg=status==='critical'?'#1E0808':status==='alert'?'#1E1200':'#071E14';
      const badgeBorder=status==='critical'?'#7A2020':status==='alert'?'#7A5000':'#0D4A2A';
      const badgeText=status==='critical'?'Critical alert':status==='alert'?'Alert':'All readings OK';
      const dateLabel=dAgo===0?`Today — ${fmtDate(dateStr)}`:dAgo===1?`Yesterday — ${fmtDate(dateStr)}`:`${fmtDate(dateStr)} · ${dAgo}d ago`;
      let body='';
      if(alerts.length>0){body+=sHead('Flagged parameters',true);alerts.forEach(a=>{body+=pRow(a,'—','#D4920A',status==='critical');});}
      body+=sHead('Port Engine',alerts.length>0);
      body+=pRow('Running hours',(row['Port Running Hours']||'—')+(row['Port Running Hours']?' hrs':''),null,false);
      body+=pRow('Oil level',row['Port Oil Level']||'—',row['Port Oil Level']&&row['Port Oil Level']!=='OK'?'#D4920A':null,false);
      body+=pRow('Oil pressure',(row['Port Oil Pressure Bar']||'—')+(row['Port Oil Pressure Bar']?' bar':''),null,false);
      body+=pRow('Oil temp',(row['Port Oil Temp C']||'—')+(row['Port Oil Temp C']?'°C':''),row['Port Oil Temp Status']==='High'?'#D4920A':null,false);
      body+=pRow('Coolant level',row['Port Coolant Level']||'—',row['Port Coolant Level']&&row['Port Coolant Level']!=='OK'?'#D4920A':null,false);
      body+=pRow('Coolant temp',(row['Port Coolant Temp C']||'—')+(row['Port Coolant Temp C']?'°C':''),parseFloat(row['Port Coolant Temp C'])>=90?'#C84040':null,false);
      body+=pRow('Smoke',row['Port Smoke']||'—',row['Port Smoke']&&row['Port Smoke']!=='No Smoke'?'#D4920A':null,false);
      body+=pRow('LO Leak',row['Port LO Leak']||'—',row['Port LO Leak']==='Yes'?'#D4920A':null,false);
      body+=pRow('FO Leak',row['Port FO Leak']||'—',row['Port FO Leak']==='Yes'?'#D4920A':null,false);
      body+=pRow('Gearbox oil',row['Port Gearbox Oil']||'—',row['Port Gearbox Oil']==='LOW'?'#D4920A':null,false);
      body+=pRow('Battery',(row['Port Battery V']||'—')+(row['Port Battery V']?' V':''),null,false);
      body+=sHead('Starboard Engine',false);
      body+=pRow('Running hours',(row['Stbd Running Hours']||'—')+(row['Stbd Running Hours']?' hrs':''),null,false);
      body+=pRow('Oil level',row['Stbd Oil Level']||'—',row['Stbd Oil Level']&&row['Stbd Oil Level']!=='OK'?'#D4920A':null,false);
      body+=pRow('Oil pressure',(row['Stbd Oil Pressure Bar']||'—')+(row['Stbd Oil Pressure Bar']?' bar':''),null,false);
      body+=pRow('Oil temp',(row['Stbd Oil Temp C']||'—')+(row['Stbd Oil Temp C']?'°C':''),row['Stbd Oil Temp Status']==='High'?'#D4920A':null,false);
      body+=pRow('Coolant level',row['Stbd Coolant Level']||'—',row['Stbd Coolant Level']&&row['Stbd Coolant Level']!=='OK'?'#D4920A':null,false);
      body+=pRow('Coolant temp',(row['Stbd Coolant Temp C']||'—')+(row['Stbd Coolant Temp C']?'°C':''),parseFloat(row['Stbd Coolant Temp C'])>=90?'#C84040':null,false);
      body+=pRow('Smoke',row['Stbd Smoke']||'—',row['Stbd Smoke']&&row['Stbd Smoke']!=='No Smoke'?'#D4920A':null,false);
      body+=pRow('LO Leak',row['Stbd LO Leak']||'—',row['Stbd LO Leak']==='Yes'?'#D4920A':null,false);
      body+=pRow('FO Leak',row['Stbd FO Leak']||'—',row['Stbd FO Leak']==='Yes'?'#D4920A':null,false);
      body+=pRow('Gearbox oil',row['Stbd Gearbox Oil']||'—',row['Stbd Gearbox Oil']==='LOW'?'#D4920A':null,false);
      body+=pRow('Battery',(row['Stbd Battery V']||'—')+(row['Stbd Battery V']?' V':''),null,false);
      body+=sHead('General',false);
      body+=pRow('Bilge',row['Bilge Status']||'—',row['Bilge Status']==='Water'?'#C84040':null,false);
      body+=pRow('Bilge pump',row['Bilge Pump']||'—',row['Bilge Pump']==='Not Working'?'#C84040':null,false);
      body+=pRow('FO Port tank',(row['FO Port Level (L)']||'—')+(row['FO Port Level (L)']?' L':''),null,false);
      body+=pRow('FO Stbd tank',(row['FO Stbd Level (L)']||'—')+(row['FO Stbd Level (L)']?' L':''),null,false);
      body+=pRow('Bunkering',row['Bunkered']==='Yes'?`Yes · ${row['Quantity Bunkered']} L`:(row['Bunkered']||'—'),null,false);
      body+=pRow('Engineer',row['Engineer']||'—',null,false);
      body+=pRow('Company',row['Company']||'—',null,false);
      body+=pRow('Report ID',row['Report ID']||'—',null,false);
      body+=`<div style="font-size:9px;font-weight:600;color:#8AA8C0;letter-spacing:0.08em;text-transform:uppercase;margin:12px 0 7px;padding-top:10px;border-top:0.5px solid #1A2F4A">${hasPics?'Photos — engine room':'Photos — not included (older than 7 days)'}</div>`;
      if(hasPics){body+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:4px">${[1,2,3,4].map(i=>`<div style="height:70px;background:#0A1628;border-radius:5px;border:0.5px solid #1E3A5F;display:flex;align-items:center;justify-content:center;font-size:10px;color:#8AA8C0">Engine room ${i}</div>`).join('')}</div>`;}
      document.getElementById('modal-boat').textContent=boat;
      document.getElementById('modal-date').textContent=`${dateLabel} · Submitted ${time}`;
      document.getElementById('modal-badge').textContent=badgeText;
      document.getElementById('modal-badge').style.cssText=`background:${badgeBg};border:0.5px solid ${badgeBorder};color:#FFFFFF;padding:3px 8px;border-radius:5px;font-size:11px;font-weight:500;display:inline-block;margin-top:5px`;
      document.getElementById('modal-body').innerHTML=body;
      document.getElementById('modalOverlay').style.display='flex';
    }
    function sHead(text,first){return `<div style="font-size:9px;font-weight:600;color:#8AA8C0;letter-spacing:0.08em;text-transform:uppercase;margin:${first?'0':'12px 0 7px'};padding-top:${first?'0':'10px'};border-top:${first?'none':'0.5px solid #1A2F4A'}">${text}</div>`;}
    function pRow(key,val,colour,isCritical){
      const c=isCritical?'#C84040':(colour?colour:'#FFFFFF');const w=colour||isCritical?'500':'400';
      return `<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:0.5px solid #0D1628"><span style="font-size:11px;color:#8AA8C0">${key}</span><span style="font-size:12px;color:${c};font-weight:${w}">${val}</span></div>`;
    }

    function switchModule(mod){
      activeModule=mod;
      document.getElementById('module-daily').style.display=mod==='daily'?'flex':'none';
      document.getElementById('module-runhrs').style.display=mod==='runhrs'?'flex':'none';
      updateNavStyles();renderAll();
    }
    function switchDailyView(view,el){
      activeView=view;
      document.querySelectorAll('.ttab').forEach(t=>t.classList.remove('on'));el.classList.add('on');
      document.getElementById('left-rail').style.display=view==='monthly'?'flex':'none';
      document.getElementById('v-daily').style.display=view==='daily'?'block':'none';
      document.getElementById('v-monthly').style.display=view==='monthly'?'block':'none';
      renderAll();
    }
    function switchRunhrsView(view,el){
      activeRunhrs=view;
      document.querySelectorAll('.stab').forEach(t=>t.classList.remove('on'));el.classList.add('on');
      document.getElementById('v-fleet').style.display=view==='fleet'?'block':'none';
      document.getElementById('v-runhrs').style.display=view==='runhrs'?'block':'none';
      document.getElementById('v-specs').style.display=view==='specs'?'block':'none';
      renderAll();
    }
    function updateNavStyles(){
      const dt=document.getElementById('tab-daily');const rh=document.getElementById('tab-runhrs');
      if(activeModule==='daily'){dt.style.opacity='1';rh.style.opacity='0.55';}
      else{dt.style.opacity='0.55';rh.style.opacity='1';}
    }


    // ── FLEET MONTHLY OVERVIEW ──
    function renderFleet(){
      const container=document.getElementById('v-fleet');
      const boats=fleetCompany==='Sea Cabbie'?SEA_CABBIE:SG_SHIPPING;
      const totalCols=fleetOlderShown?12:6;
      const months=monthSequence(totalCols);

      // Company tab bar
      let html=`<div style="display:flex;gap:0;margin-bottom:16px;border-bottom:2px solid #1E3A5F">
        ${fleetCompanyTab('Sea Cabbie')}${fleetCompanyTab('SG Shipping')}
      </div>`;

      html+=`<div style="overflow-x:auto">`;
      html+=`<table style="border-collapse:collapse;font-size:12px;width:100%;min-width:${110+months.length*90}px">`;

      // ── Header row (once at top) ──
      html+=`<thead><tr>`;
      html+=`<th style="position:sticky;left:0;z-index:3;text-align:left;min-width:160px;width:160px;padding:8px 12px;background:#071828;border-right:1px solid #1E3A5F;border-bottom:2px solid #1E3A5F;font-size:10px;font-weight:600;color:#8AA8C0;text-transform:uppercase;letter-spacing:0.06em">Vessel</th>`;
      months.forEach((mo,i)=>{
        const isLatest=i===0;
        html+=`<th style="text-align:center;min-width:90px;padding:8px 12px;border-left:1px solid #1E3A5F;border-bottom:2px solid #1E3A5F;font-size:12px;font-weight:700;color:${isLatest?'#FFFFFF':'#AABFCC'};background:${isLatest?'#0D2A3A':'#071828'};white-space:nowrap">${fmtMonthLabel(mo.month,mo.year)}</th>`;
      });
      html+=`<th style="background:#071828;border-left:1px solid #1E3A5F;border-bottom:2px solid #1E3A5F;padding:6px 10px;vertical-align:middle;white-space:nowrap">
        <div onclick="toggleFleetOlder()" style="cursor:pointer;font-size:10px;font-weight:600;color:#0D9AAA;padding:4px 10px;border:1px solid #0D5A6A;border-radius:4px;background:#071828;text-align:center">
          ${fleetOlderShown?'Newer ▶':'◀ Older'}
        </div>
      </th>`;
      html+=`</tr></thead>`;

      // ── Body: per boat = 3 rows ──
      // Row 1: boat name stylized box (data cols empty)
      // Row 2: Port Engine label + data
      // Row 3: Stbd Engine label + data
      html+=`<tbody>`;
      boats.forEach((boat,bi)=>{
        const isLatestMo = true;
        const rowBg = bi%2===0 ? '#0A1628' : '#0B1A2E';

        const portVals = months.map(mo=>runHrsForMonth(boat,'Port',mo.month,mo.year));
        const stbdVals = months.map(mo=>runHrsForMonth(boat,'Stbd',mo.month,mo.year));

        // ── Row 1: Boat name ──
        html+=`<tr>`;
        html+=`<td style="position:sticky;left:0;z-index:1;padding:10px 12px;border-right:1px solid #1E3A5F;border-top:2px solid #1A3A5F;border-bottom:none;background:#0A1628">
          <div style="display:inline-flex;align-items:center;padding:5px 14px;background:#0D2040;border:1.5px solid #1E4A7A;border-radius:6px;box-shadow:0 0 8px rgba(13,100,160,0.25)">
            <span style="font-size:14px;font-weight:700;color:#FFFFFF;letter-spacing:0.04em;white-space:nowrap">${boat}</span>
          </div>
        </td>`;
        // Empty cells across month columns
        months.forEach((mo,i)=>{
          const isLatest=i===0;
          html+=`<td style="border-left:1px solid #1A2F4A;border-top:2px solid #1A3A5F;border-bottom:none;background:${isLatest?'#0D2234':rowBg}"></td>`;
        });
        html+=`<td style="background:#071828;border-left:1px solid #1A2F4A;border-top:2px solid #1A3A5F;border-bottom:none"></td>`;
        html+=`</tr>`;

        // ── Row 2: Port Engine ──
        html+=`<tr>`;
        html+=`<td style="position:sticky;left:0;z-index:1;padding:5px 12px 4px 18px;border-right:1px solid #1E3A5F;border-top:none;border-bottom:none;background:#0A1628">
          <div style="display:inline-flex;align-items:center;padding:2px 10px;background:#071828;border:1px solid #1E3A5F;border-radius:4px">
            <span style="font-size:10px;font-weight:600;color:#8AA8C0;letter-spacing:0.06em;text-transform:uppercase">Port</span>
          </div>
        </td>`;
        portVals.forEach((v,i)=>{
          const isLatest=i===0;
          html+=`<td style="text-align:right;padding:5px 14px 4px 12px;border-left:1px solid #1A2F4A;border-top:none;border-bottom:none;background:${isLatest?'#0D2234':rowBg};font-size:13px;font-weight:600;color:${v!==null?'#FFFFFF':'#3A4A60'};white-space:nowrap">${v!==null?Math.round(v).toLocaleString('en-SG'):'—'}</td>`;
        });
        html+=`<td style="background:#071828;border-left:1px solid #1A2F4A;border-top:none;border-bottom:none"></td>`;
        html+=`</tr>`;

        // ── Row 3: Stbd Engine ──
        const isLast = bi===boats.length-1;
        html+=`<tr>`;
        html+=`<td style="position:sticky;left:0;z-index:1;padding:4px 12px 8px 18px;border-right:1px solid #1E3A5F;border-top:none;border-bottom:${isLast?'none':'1px solid #1A2F4A'};background:#0A1628">
          <div style="display:inline-flex;align-items:center;padding:2px 10px;background:#071828;border:1px solid #1E3A5F;border-radius:4px">
            <span style="font-size:10px;font-weight:600;color:#8AA8C0;letter-spacing:0.06em;text-transform:uppercase">Stbd</span>
          </div>
        </td>`;
        stbdVals.forEach((v,i)=>{
          const isLatest=i===0;
          html+=`<td style="text-align:right;padding:4px 14px 8px 12px;border-left:1px solid #1A2F4A;border-top:none;border-bottom:${isLast?'none':'1px solid #1A2F4A'};background:${isLatest?'#0D2234':rowBg};font-size:12px;font-weight:500;color:${v!==null?'#7ACFAA':'#3A4A60'};white-space:nowrap">${v!==null?Math.round(v).toLocaleString('en-SG'):'—'}</td>`;
        });
        html+=`<td style="background:#071828;border-left:1px solid #1A2F4A;border-top:none;border-bottom:${isLast?'none':'1px solid #1A2F4A'}"></td>`;
        html+=`</tr>`;
      });

      html+=`</tbody></table></div>`;

      // Legend
      html+=`<div style="display:flex;align-items:center;gap:20px;margin-top:10px;font-size:10px">
        <div style="display:flex;align-items:center;gap:5px"><div style="width:10px;height:3px;background:#FFFFFF;border-radius:2px"></div><span style="color:#8AA8C0">Port run hrs</span></div>
        <div style="display:flex;align-items:center;gap:5px"><div style="width:10px;height:3px;background:#7ACFAA;border-radius:2px"></div><span style="color:#8AA8C0">Stbd run hrs</span></div>
        <span style="color:#5A7A90;margin-left:auto">Cumulative hrs · no-report months carry forward last known value</span>
      </div>`;

      container.innerHTML=html;
    }

    function fleetCompanyTab(name){
      const active=fleetCompany===name;
      return `<div onclick="switchFleetCompany('${name}')"
        style="padding:9px 20px;cursor:pointer;font-size:13px;font-weight:${active?'700':'400'};
               color:${active?'#FFFFFF':'#7A9AB0'};
               border-bottom:${active?'2px solid #0D9AAA':'2px solid transparent'};
               margin-bottom:-2px;
               background:${active?'#071828':'transparent'};
               border-radius:4px 4px 0 0;letter-spacing:0.03em">${name}</div>`;
    }
    function switchFleetCompany(name){fleetCompany=name;fleetOlderShown=false;renderFleet();}
    function toggleFleetOlder(){fleetOlderShown=!fleetOlderShown;renderFleet();}


    // ── MONTHLY RUNNING HOURS ──
    function renderRunhrs(){
      const container=document.getElementById('v-runhrs');
      let html=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
        <span style="font-size:12px;color:#8AA8C0">Viewing:</span>
        <select id="rh-month-sel" onchange="rhMonthChange()" style="width:130px"></select>
        <select id="rh-year-sel" onchange="rhYearChange()" style="width:90px"></select>
      </div><div id="rh-sea-wrap"></div><div id="rh-sg-wrap"></div>`;
      container.innerHTML=html;
      populateRhSelects();
      renderRunhrsCompany('Sea Cabbie',SEA_CABBIE,'rh-sea');
      renderRunhrsCompany('SG Shipping',SG_SHIPPING,'rh-sg');
    }

    function populateRhSelects(){
      const ms=document.getElementById('rh-month-sel');const ys=document.getElementById('rh-year-sel');
      if(ms&&!ms.options.length){MONTH_NAMES.forEach((m,i)=>{const o=document.createElement('option');o.value=i;o.textContent=m;if(i===runhrsMonth)o.selected=true;ms.appendChild(o);});}else if(ms){ms.value=runhrsMonth;}
      if(ys&&!ys.options.length){[2021,2022,2023,2024,2025,2026,2027].forEach(y=>{const o=document.createElement('option');o.value=y;o.textContent=y;if(y===runhrsYear)o.selected=true;ys.appendChild(o);});}else if(ys){ys.value=runhrsYear;}
    }
    function rhMonthChange(){runhrsMonth=parseInt(document.getElementById('rh-month-sel').value,10);renderAll();}
    function rhYearChange(){runhrsYear=parseInt(document.getElementById('rh-year-sel').value,10);renderAll();}

    function renderRunhrsCompany(name,boats,prefix){
      const wrap=document.getElementById(prefix+'-wrap');if(!wrap)return;
      const bodyId=prefix+'-body';const isSea=name==='Sea Cabbie';
      let html=`<div id="${prefix}-header" onclick="toggleRhAccordion('${prefix}')"
        style="background:#0D1F3C;border:1px solid #1E3A5F;border-radius:8px 8px 0 0;padding:12px 16px;display:flex;align-items:center;gap:10px;cursor:pointer;margin-top:14px">
        <div style="width:9px;height:9px;border-radius:50%;background:#1A9A6A"></div>
        <div style="font-size:14px;font-weight:700;color:#FFFFFF;text-transform:uppercase;letter-spacing:0.06em;flex:1">${name}</div>
        <div style="font-size:11px;color:#8AA8C0">${boats.length} vessels</div>
        <div id="${prefix}-chev" class="chevron" style="font-size:12px;color:#8AA8C0">▶</div></div>
      <div id="${bodyId}" style="border:1px solid #1E3A5F;border-top:none;border-radius:0 0 8px 8px;overflow:hidden;display:${isSea?'block':'none'}">`;
      boats.forEach(boat=>{
        const portCur=getLatestRunHrs(boat,'Port');const stbdCur=getLatestRunHrs(boat,'Stbd');
        const svcCol=svcColour(hrsToNextSvc(boat,'Port'));
        html+=`<div onclick="toggleRhBoat('${prefix}','${boat}')"
          style="background:#0A1628;border-bottom:1px solid #1A2F4A;padding:10px 16px;display:flex;align-items:center;gap:8px;cursor:pointer">
          <div style="width:9px;height:9px;border-radius:50%;background:${svcCol}"></div>
          <div style="flex:1;font-size:14px;font-weight:600;color:#FFFFFF">${boat}</div>
          <div style="font-size:11px;color:#8AA8C0">Port: ${portCur!==null?Math.round(portCur).toLocaleString('en-SG'):'—'} · Stbd: ${stbdCur!==null?Math.round(stbdCur).toLocaleString('en-SG'):'—'}</div>
          <div id="${prefix}-${boat}-chev" class="chevron" style="font-size:11px;color:#8AA8C0">▶</div></div>
          <div id="${prefix}-${boat}-grid" style="display:none">${monthlyRunhrsGridHTML(boat)}</div>`;
      });
      html+=`</div>`;
      wrap.innerHTML=html;
      setTimeout(()=>{if(isSea)document.getElementById(prefix+'-chev').classList.add('open');},0);
    }

    function toggleRhAccordion(prefix){
      const body=document.getElementById(prefix+'-body');const chev=document.getElementById(prefix+'-chev');
      const open=body.style.display!=='none';body.style.display=open?'none':'block';
      if(open)chev.classList.remove('open');else chev.classList.add('open');
    }
    function toggleRhBoat(prefix,boat){
      const gridId=prefix+'-'+boat+'-grid';const current=document.getElementById(gridId);
      const open=current.style.display!=='none';
      Array.from(document.querySelectorAll(`[id^="${prefix}-"][id$="-grid"]`)).forEach(el=>el.style.display='none');
      Array.from(document.querySelectorAll(`[id^="${prefix}-"][id$="-chev"]:not([id="${prefix}-chev"])`)).forEach(el=>el.classList.remove('open'));
      if(!open){current.innerHTML=monthlyRunhrsGridHTML(boat);current.style.display='block';document.getElementById(prefix+'-'+boat+'-chev').classList.add('open');}
    }

    function monthlyRunhrsGridHTML(boat){
      const dim=new Date(runhrsYear,runhrsMonth+1,0).getDate();const today=todaySGT();
      const isThisMo=runhrsMonth===new Date().getMonth()&&runhrsYear===new Date().getFullYear();
      const todayD=parseInt(today.slice(8),10);
      const portMap=monthlyHrsMap(boat,'Port',runhrsMonth,runhrsYear);
      const stbdMap=monthlyHrsMap(boat,'Stbd',runhrsMonth,runhrsYear);
      let thead='<tr>';
      thead+=`<th style="text-align:left;width:160px;min-width:160px;background:#0D1F3C;color:#FFFFFF;font-size:11px;font-weight:500;padding:5px 10px;border:1px solid #1E3A5F"></th>`;
      for(let d=1;d<=dim;d++){
        const isToday=isThisMo&&d===todayD;const isFuture=isThisMo&&d>todayD;
        thead+=`<th style="text-align:center;min-width:38px;background:${isToday?'#0D2A3A':'#0D1F3C'};color:${isFuture?'#3A4A60':'#FFFFFF'};font-size:11px;font-weight:${isToday?'700':'500'};padding:5px 6px;border:1px solid #1E3A5F">${d}</th>`;
      }
      thead+='</tr>';
      function mkrow(label,getter,isDiff){
        let row=`<td style="background:#0D1F3C;color:#FFFFFF;font-size:12px;text-align:left;padding:5px 10px;border:1px solid #1A2F4A">${label}</td>`;
        let prev=null;
        for(let d=1;d<=dim;d++){
          const isToday=isThisMo&&d===todayD;const isFuture=isThisMo&&d>todayD;
          const bg=isToday?'#0D2A3A':'#0A1628';const val=getter(d);
          let display='—';let color='#3A4A60';
          if(!isFuture&&val!=null){
            if(isDiff){if(prev!=null&&val>=prev){display=(val-prev).toFixed(1);}else{display='0.0';}prev=val;}
            else{display=val.toFixed(1);}
            color='#FFFFFF';
          }
          row+=`<td style="background:${bg};color:${color};border:1px solid #1A2F4A;padding:4px 6px;font-size:${isDiff?12:13}px;text-align:center;cursor:default">${display}</td>`;
        }
        return `<tr>${row}</tr>`;
      }
      const tbody=[
        mkrow('Port hrs (cumul.)',d=>portMap[d]??null,false),
        mkrow('Port daily +hrs',d=>portMap[d]??null,true),
        mkrow('Stbd hrs (cumul.)',d=>stbdMap[d]??null,false),
        mkrow('Stbd daily +hrs',d=>stbdMap[d]??null,true)
      ].join('');
      const footer=`<div style="display:flex;gap:8px;margin-top:10px">
        <div style="flex:1;background:#0D1F3C;border:1px solid #1A2F4A;border-radius:6px;padding:10px 14px">
          <div style="font-size:11px;font-weight:700;color:#FFFFFF;margin-bottom:2px">Port — ${MONTH_NAMES[runhrsMonth]} total</div>
          <div style="font-size:18px;font-weight:700;color:#1A9A6A">—</div></div>
        <div style="flex:1;background:#0D1F3C;border:1px solid #1A2F4A;border-radius:6px;padding:10px 14px">
          <div style="font-size:11px;font-weight:700;color:#FFFFFF;margin-bottom:2px">Stbd — ${MONTH_NAMES[runhrsMonth]} total</div>
          <div style="font-size:18px;font-weight:700;color:#1A9A6A">—</div></div>
        <div style="flex:1;background:#0D1F3C;border:1px solid #1A2F4A;border-radius:6px;padding:10px 14px">
          <div style="font-size:11px;font-weight:700;color:#FFFFFF;margin-bottom:2px">Port → next service</div>
          <div style="font-size:18px;font-weight:700;color:#1A9A6A">—</div></div></div>`;
      return `<div style="margin-top:6px">
        <div style="padding:10px 14px;background:#071828;border-bottom:1px solid #1E3A5F"><div style="font-size:15px;font-weight:700;color:#FFFFFF">${boat}</div></div>
        <table style="width:100%;border-collapse:collapse;font-size:12px"><thead>${thead}</thead><tbody>${tbody}</tbody></table>
        ${footer}</div>`;
    }

    // ── ENGINE SPECS ──
    function renderSpecs(){
      const container=document.getElementById('v-specs');
      let html=`<div style="background:#071828;border:1px solid #1E3A5F;border-radius:4px;padding:8px 12px;margin-bottom:14px;font-size:11px;color:#8AA8C0">Spec data is entered in the EngineSpecs tab of the Google Sheet. To update: edit the sheet directly, then refresh.</div>`;
      if(!specRows.length){html+=`<div style="background:#0D1F3C;border:1px solid #1A2F4A;border-radius:8px;padding:16px;text-align:center;font-size:12px;color:#D4920A">No engine spec data found. Please add the EngineSpecs tab to the Google Sheet.</div>`;container.innerHTML=html;return;}
      html+=specSection('Sea Cabbie',SEA_CABBIE,true)+specSection('SG Shipping',SG_SHIPPING,false);
      container.innerHTML=html;
    }

    function specSection(label,boats,isFirst){
      const rows=specRows.filter(r=>boats.includes(r['Boat']));
      let html=`<div style="font-size:11px;font-weight:700;color:#FFFFFF;text-transform:uppercase;letter-spacing:0.08em;margin:${isFirst?'0':'12px 0 7px'}">${label}</div>
      <div style="background:#0D1F3C;border:1px solid #1A2F4A;border-radius:8px;overflow:hidden;margin-bottom:8px">
        <table style="width:100%;border-collapse:collapse;font-size:12px">
          <thead><tr style="background:#071828;color:#FFFFFF;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em">
            <th style="padding:6px 10px;border-bottom:1px solid #1E3A5F;width:100px;text-align:left">Boat</th>
            <th style="padding:6px 10px;border-bottom:1px solid #1E3A5F;width:50px;text-align:left">Side</th>
            <th style="padding:6px 10px;border-bottom:1px solid #1E3A5F;text-align:left">Engine Model</th>
            <th style="padding:6px 10px;border-bottom:1px solid #1E3A5F;width:90px;text-align:right">Power (kW)</th>
            <th style="padding:6px 10px;border-bottom:1px solid #1E3A5F;width:100px;text-align:right">Year Installed</th>
          </tr></thead><tbody>`;
      boats.forEach(boat=>{
        const port=rows.find(r=>r['Boat']===boat&&r['Engine Side']==='Port');
        const stbd=rows.find(r=>r['Boat']===boat&&r['Engine Side']==='Stbd');
        if(!port&&!stbd){html+=`<tr><td style="padding:16px;color:#3A4A60;text-align:center" colspan="5">—</td></tr>`;return;}
        const span=(port&&stbd)?'2':'1';
        if(port)html+=`<tr style="border-bottom:1px solid #1A2F4A"><td rowspan="${span}" style="padding:7px 10px;border-right:1px solid #1A2F4A;font-size:13px;font-weight:600;color:#FFFFFF;vertical-align:middle">${boat}</td><td style="padding:7px 10px;font-size:12px;color:#FFFFFF">${port['Engine Side']||'Port'}</td><td style="padding:7px 10px;font-size:12px;color:#FFFFFF">${port['Engine Model']||'—'}</td><td style="padding:7px 10px;font-size:12px;color:#FFFFFF;text-align:right">${port['Power (kW)']||'—'}</td><td style="padding:7px 10px;font-size:12px;color:#FFFFFF;text-align:right">${port['Year Installed']||'—'}</td></tr>`;
        if(stbd)html+=`<tr style="border-bottom:1px solid #1A2F4A"><td style="padding:7px 10px;font-size:12px;color:#FFFFFF">${stbd['Engine Side']||'Stbd'}</td><td style="padding:7px 10px;font-size:12px;color:#FFFFFF">${stbd['Engine Model']||'—'}</td><td style="padding:7px 10px;font-size:12px;color:#FFFFFF;text-align:right">${stbd['Power (kW)']||'—'}</td><td style="padding:7px 10px;font-size:12px;color:#FFFFFF;text-align:right">${stbd['Year Installed']||'—'}</td></tr>`;
      });
      return html+`</tbody></table></div>`;
    }

    window.addEventListener('DOMContentLoaded',()=>{
      const sgt=new Date(Date.now()+8*3600000);
      const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      const mons=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      const hd=document.getElementById('header-date');
      if(hd)hd.textContent=`${days[sgt.getUTCDay()]} ${sgt.getUTCDate()} ${mons[sgt.getUTCMonth()]} ${sgt.getUTCFullYear()}`;
      const sgWrap=document.getElementById('logo-sg-group-wrap');const nxWrap=document.getElementById('logo-nirix-wrap');
      if(sgWrap)sgWrap.innerHTML=sgGroupLogoHTML();if(nxWrap)nxWrap.innerHTML=nirixLogoHTML();
    });

    function doLogin(){
      const pass=document.getElementById('loginPass').value;
      const err=document.getElementById('loginErr');err.textContent='';
      if(pass===DASHBOARD_PASS){
        document.getElementById('loginScreen').style.display='none';
        document.getElementById('app').style.display='flex';
        loadData();refreshTimer=setInterval(loadData,60000);
      }else{err.textContent='Incorrect password.';}
    }
  </script>
</head>
<body>

<div id="loginScreen" style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#0A1628">
  <div style="width:360px;background:#1A2535;border:1px solid #2D3F55;border-radius:16px;padding:40px">
    <div style="font-size:28px;font-weight:800;color:#7AB8C8;letter-spacing:6px;text-align:center;margin-bottom:4px">NIRIX</div>
    <div style="font-size:13px;color:#8AA8C0;text-align:center;margin-bottom:32px">Office Dashboard</div>
    <input id="loginPass" type="password" placeholder="Dashboard password"
      style="width:100%;padding:12px 14px;background:#0A1628;border:1px solid #2D3F55;border-radius:10px;color:#FFFFFF;font-size:15px;margin-bottom:12px;box-sizing:border-box"
      onkeydown="if(event.key==='Enter')doLogin()" />
    <button onclick="doLogin()" style="width:100%;padding:14px;background:#1E3A5F;border:none;border-radius:10px;color:#FFFFFF;font-size:16px;font-weight:700;cursor:pointer;margin-top:4px">Sign In</button>
    <div id="loginErr" style="color:#C84040;font-size:13px;margin-top:10px;text-align:center;min-height:18px"></div>
  </div>
</div>

<div id="app" style="display:none;flex-direction:column;min-height:100vh;background:#0A1628">

  <div id="header" style="display:flex;align-items:center;padding:9px 18px;background:#0A1628;border-bottom:1px solid #1E3A5F;flex-shrink:0;gap:10px">
    <div id="logo-sg-group-wrap"></div>
    <div style="flex:1;text-align:center">
      <div style="font-size:15px;font-weight:700;color:#FFFFFF;letter-spacing:0.06em;text-transform:uppercase">TECHNICAL DASHBOARD</div>
      <div style="font-size:9px;color:#8AA8C0;letter-spacing:0.12em;text-transform:uppercase;margin-top:2px">Fleet Engine Reports</div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
      <div id="logo-nirix-wrap"></div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:1px">
        <div style="font-size:10px;color:#8AA8C0;letter-spacing:2px">NIRIX</div>
        <div id="header-date" style="font-size:10px;color:#8AA8C0"></div>
      </div>
    </div>
  </div>

  <div id="module-nav" style="background:#0D1F3C;border-bottom:1px solid #1E3A5F;padding:0 18px;display:flex;align-items:flex-end;gap:6px;flex-shrink:0">
    <div id="tab-daily" onclick="switchModule('daily')" style="padding:5px 10px 0;margin-top:5px;border:1px solid #1E3A5F;border-bottom:none;border-radius:6px 6px 0 0;display:flex;flex-direction:column;cursor:pointer;opacity:1">
      <div style="font-size:16px;font-weight:700;color:#FFFFFF;padding:3px 0">Daily Reports</div>
      <div style="display:flex;gap:2px;margin-top:3px">
        <div class="ttab on" onclick="event.stopPropagation();switchDailyView('daily',this)" style="padding:5px 12px;font-size:11px;border-radius:4px 4px 0 0">Daily view</div>
        <div class="ttab" onclick="event.stopPropagation();switchDailyView('monthly',this)" style="padding:5px 12px;font-size:11px;border-radius:4px 4px 0 0">Monthly view</div>
      </div>
    </div>
    <div id="tab-runhrs" onclick="switchModule('runhrs')" style="padding:5px 10px 0;margin-top:5px;border:1px solid #0D8A9A;border-bottom:none;border-radius:6px 6px 0 0;display:flex;flex-direction:column;cursor:pointer;opacity:0.55">
      <div style="font-size:16px;font-weight:700;color:#FFFFFF;padding:3px 0">Engine Run-hrs Records</div>
      <div style="display:flex;gap:2px;margin-top:3px">
        <div class="stab on" onclick="event.stopPropagation();switchRunhrsView('fleet',this)" style="padding:5px 12px;font-size:11px;border-radius:4px 4px 0 0">Fleet monthly overview</div>
        <div class="stab" onclick="event.stopPropagation();switchRunhrsView('runhrs',this)" style="padding:5px 12px;font-size:11px;border-radius:4px 4px 0 0">Monthly running hours</div>
        <div class="stab" onclick="event.stopPropagation();switchRunhrsView('specs',this)" style="padding:5px 12px;font-size:11px;border-radius:4px 4px 0 0">Engine specs</div>
      </div>
    </div>
  </div>

  <div style="flex:1;display:flex;overflow:hidden">
    <div id="module-daily" style="flex:1;display:flex;overflow:hidden">
      <div id="left-rail" style="display:none;width:195px;min-width:195px;border-right:1px solid #1E3A5F;flex-direction:column;background:#0D1F3C;overflow-y:auto">
        <div id="rail-inner"></div>
      </div>
      <div id="daily-main" style="flex:1;display:flex;flex-direction:column">
        <div id="v-daily" style="overflow-y:auto;padding:14px 18px;flex:1"></div>
        <div id="v-monthly" style="display:none;overflow:auto;padding:14px 18px;flex:1">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">
            <button onclick="prevMonth()" style="width:22px;height:22px;background:none;border:0.5px solid #1E3A5F;border-radius:5px;cursor:pointer;font-size:13px;color:#8AA8C0">&#8249;</button>
            <div><span id="mv-boat" style="font-size:13px;font-weight:500;color:#FFFFFF"></span><span id="mv-month" style="font-size:11px;color:#8AA8C0"></span></div>
            <button onclick="nextMonth()" style="width:22px;height:22px;background:none;border:0.5px solid #1E3A5F;border-radius:5px;cursor:pointer;font-size:13px;color:#8AA8C0">&#8250;</button>
          </div>
          <table id="grid-table" style="border-collapse:collapse;font-size:11px;min-width:100%"></table>
        </div>
      </div>
    </div>
    <div id="module-runhrs" style="flex:1;display:none;flex-direction:column;overflow:hidden">
      <div id="v-fleet"  style="flex:1;overflow-y:auto;padding:14px 18px"></div>
      <div id="v-runhrs" style="flex:1;overflow-y:auto;padding:14px 18px;display:none"></div>
      <div id="v-specs"  style="flex:1;overflow-y:auto;padding:14px 18px;display:none"></div>
    </div>
  </div>
</div>

<div id="modalOverlay" onclick="if(event.target===this)closeModal()"
  style="position:fixed;inset:0;background:rgba(4,10,24,0.88);display:none;align-items:center;justify-content:center;z-index:100">
  <div style="background:#0D1F3C;border:1px solid #1E3A5F;border-radius:12px;width:490px;max-width:92%;max-height:86vh;display:flex;flex-direction:column;overflow:hidden">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;padding:13px 17px 10px;border-bottom:1px solid #1E3A5F;flex-shrink:0">
      <div>
        <div id="modal-boat" style="font-size:13px;font-weight:600;color:#FFFFFF"></div>
        <div id="modal-date" style="font-size:10px;color:#8AA8C0;margin-top:3px"></div>
        <div id="modal-badge" style="margin-top:5px"></div>
      </div>
      <button onclick="closeModal()" style="background:none;border:none;color:#8AA8C0;font-size:18px;cursor:pointer;padding:0 0 0 10px;line-height:1"
        onmouseover="this.style.color='#FFFFFF'" onmouseout="this.style.color='#8AA8C0'">&#x2715;</button>
    </div>
    <div id="modal-body" style="overflow-y:auto;padding:13px 17px;flex:1"></div>
    <div style="padding:11px 17px;border-top:1px solid #1E3A5F;flex-shrink:0;display:flex;gap:7px">
      <div onclick="downloadPDF()" onmouseover="this.style.background='#0D4A5A'" onmouseout="this.style.background='#0D3A4A'"
        style="flex:1;display:flex;align-items:center;justify-content:center;gap:7px;padding:8px 0;border-radius:6px;background:#0D3A4A;border:1px solid #1E5A6A;color:#FFFFFF;font-size:11px;font-weight:500;cursor:pointer">
        &#8659;&nbsp;Download PDF report
      </div>
      <div onclick="closeModal()" onmouseover="this.style.color='#FFFFFF';this.style.borderColor='#2A4A5A'" onmouseout="this.style.color='#8AA8C0';this.style.borderColor='#1E3A5F'"
        style="padding:8px 16px;border-radius:6px;background:transparent;border:1px solid #1E3A5F;color:#8AA8C0;font-size:11px;cursor:pointer">Close</div>
    </div>
  </div>
</div>

</body>
</html>
